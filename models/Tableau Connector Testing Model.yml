unique_name: Tableau Connector Testing Model
object_type: model
label: Tableau Connector Testing Model
description: This is a model based on Adventureworks for Tableau connector testing
metrics:
  - unique_name: Order Quantity
    folder: Sales Metrics
  - unique_name: Sales
    folder: Sales Metrics
  - unique_name: Profit
    folder: Sales Metrics
  - unique_name: Discount
    folder: Sales Metrics
  - unique_name: Shipping Cost
    folder: Sales Metrics
relationships:
  - unique_name: fk_dimcustomer_dimension_Customer_Name
    from:
      dataset: fk_orderfact
      join_columns:
        - customerid
    to:
      dimension: Customer Dimension
      level: Customer Name
  - unique_name: fk_orderfact_productid_to_Product Dimension_Product
    from:
      dataset: fk_orderfact
      join_columns:
        - productid
    to:
      dimension: Product Dimension
      level: Product
  - unique_name: fk_orderfact_dayid_to_Date Dimension_Day
    from:
      dataset: fk_orderfact
      join_columns:
        - dayid
    to:
      dimension: Date Dimension
      level: Day
