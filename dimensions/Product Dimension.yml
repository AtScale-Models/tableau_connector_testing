unique_name: Product Dimension
object_type: dimension
label: Product Dimension
hierarchies:
  - unique_name: Product Hierarchy
    label: Product Hierarchy
    levels:
      - unique_name: Product Category
      - unique_name: Product Subcategory
      - unique_name: Product
level_attributes:
  - unique_name: Product
    label: Product
    contains_unique_names: false
    dataset: fk_dimproduct
    is_unique_key: true
    key_columns:
      - productid
    name_column: productname
  - unique_name: Product Subcategory
    label: Product Subcategory
    contains_unique_names: false
    dataset: fk_dimproductsubcategory
    is_unique_key: true
    key_columns:
      - subcategoryid
    name_column: subcategoryname
    sort_column: subcategoryname
  - unique_name: Product Category
    label: Product Category
    contains_unique_names: false
    dataset: fk_dimproductcategory
    is_unique_key: true
    key_columns:
      - categoryid
    name_column: categoryname
    sort_column: categoryname
relationships:
  - from:
      dataset: fk_dimproduct
      join_columns:
        - productid
    to:
      level: Product
    type: snowflake
  - from:
      dataset: fk_dimproduct
      join_columns:
        - subcategoryid
    to:
      level: Product Subcategory
    type: snowflake
  - from:
      dataset: fk_dimproductsubcategory
      join_columns:
        - categoryid
    to:
      level: Product Category
    type: snowflake
type: standard
